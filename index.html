<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Scheme Generator</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="controlers">
      <input id="seed" type="color" />
      <select id="mode">
        <option value="">Monochrome</option>
        <option value="">Monochrome-dark</option>
        <option value="">Monochrome-light</option>
        <option value="">Analogic</option>
        <option value="">Complement</option>
        <option value="">Analogic-complement</option>
        <option value="">Triad</option>
      </select>
      <button>Get color scheme</button>
    </div>
    <div class="colors">
      <div id="color1"></div>
      <div id="color2"></div>
      <div id="color3"></div>
      <div id="color4"></div>
      <div id="color5"></div>
    </div>
    <div class="codes">
      <div id="code1">#123456</div>
      <div id="code2">#123456</div>
      <div id="code3">#123456</div>
      <div id="code4">#123456</div>
      <div id="code5">#123456</div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
